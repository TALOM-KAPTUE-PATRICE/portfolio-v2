<section id="about" class="about-section">
  <div class="container grid-layout">
    <div class="about-visual">
      <div class="image-wrapper">
        <div class="tech-overlay">
          <span>Clean Code</span>
          <span>Scalability</span>
          <span>AI First</span>
        </div>
        <img src="/assets/images/rogner.jpg" alt="Patrice TALOM KAPTUE" class="profile-img">
      </div>
    </div>

    <div class="about-text">
      <h2 class="gradient-text">{{ 'about.title' | translate }}</h2>
      <h3 class="subtitle">{{ 'about.subtitle' | translate }}</h3>
      
      <p [innerHTML]="'about.p1' | translate"></p>
      <p [innerHTML]="'about.p2' | translate"></p>

      <div class="about-stats">
        <div class="stat-item">
          <span class="stat-number">3+</span>
          <span class="stat-label">{{ 'about.stats.projects' | translate }}</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">99%</span>
          <span class="stat-label">{{ 'about.stats.uptime' | translate }}</span>
        </div>
      </div>
      <div class="about-actions">
        <a href="assets/docs/Cv_Talom.pdf" download class="btn-cv">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          {{ 'about.cv_cta' | translate }}
        </a>
      </div>
    </div>
  </div>
</section>
