<section class="hero-section"> <!-- Supprimez *if="true" si présent -->
  <div class="hero-content">
    <div class="hero-text">
      <span class="badge-devops">{{ 'hero.badge' | translate }}</span>
      <h1 class="hero-title">
        {{ 'hero.title' | translate }} <span class="gradient-text">{{ 'hero.ia' | translate }}</span> {{ 'hero.and' | translate }} <span
          class="gradient-text">{{ 'hero.cloud' | translate }}</span>.
      </h1>
      <p class="hero-description"> {{ 'hero.description' | translate }}
      </p>

      <div class="hero-actions">
        <a [routerLink]="['/projects']" class="btn-primary">{{ 'hero.cta_projects' | translate }}</a>
        <a [routerLink]="['/contact']" class="btn-outline">{{ 'hero.cta_contact' | translate }}</a>
      </div>
    </div>

    <div class="hero-visual">
      <div class="abstract-shape">
        <!-- Une illustration SVG moderne représentant la fusion Code/IA -->
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <path fill="var(--primary)"
            d="M44.7,-76.4C58.1,-69.2,69.2,-57.4,76.4,-43.7C83.6,-30,86.9,-15,85.8,-0.6C84.7,13.7,79.2,27.5,71.1,39.8C63,52.1,52.3,63,39.7,70.7C27.1,78.4,12.6,83,0.3,82.5C-12,82,-24,76.4,-35.6,68.2C-47.2,60,-58.4,49.2,-66.8,36.5C-75.2,23.8,-80.8,9.2,-80.3,-5.2C-79.8,-19.6,-73.2,-33.8,-63.8,-45.1C-54.4,-56.4,-42.2,-64.8,-29.4,-72.4C-16.6,-80,-8.3,-86.8,4.1,-87.5C16.5,-88.2,31.3,-83.6,44.7,-76.4Z"
            transform="translate(100 100)" />
        </svg>
        <div class="floating-tech">
          <span class="tech-icon spring">🍃</span>
          <span class="tech-icon angular">🅰️</span>
          <span class="tech-icon ai">🤖</span>
          <span class="tech-icon devops">⚙️</span>
        </div>
      </div>
    </div>
  </div>
</section>
