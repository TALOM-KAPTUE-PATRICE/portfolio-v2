<header class="header-container">
  <nav class="nav-content">
    <div class="logo">
      <span class="gradient-text font-bold">Patrice KAPTUE</span>
    </div>

    <!-- Desktop Menu -->
    <ul class="nav-links">
      @for (item of navItems; track item.label) {
        <li>
          <a [routerLink]="item.link" 
             routerLinkActive="active-link" 
             [routerLinkActiveOptions]="{exact: true}"
             class="nav-item">{{ item.label | translate }}</a>
        </li>
      }
    </ul>

    <app-language-switcher />

    <div class="actions">
      <!-- Theme Switcher -->
      <div class="theme-switcher desktop-only">
        <button (click)="changeTheme('light')" [class.active]="currentTheme() === 'light'" title="Mode Clair">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button (click)="changeTheme('dark')" [class.active]="currentTheme() === 'dark'" title="Mode Sombre">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button (click)="changeTheme('system')" [class.active]="currentTheme() === 'system'" title="Mode Système">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
      </div>

      <button class="mobile-menu-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
        <span class="bar" [class.open]="isMenuOpen()"></span>
        <span class="bar" [class.open]="isMenuOpen()"></span>
        <span class="bar" [class.open]="isMenuOpen()"></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Overlay -->
  <div class="mobile-nav" [class.open]="isMenuOpen()">
    <ul class="mobile-links">
      @for (item of navItems; track item.label) {
        <li>
          <a [routerLink]="item.link" 
             routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact: true}"
             class="mobile-nav-item" 
             (click)="isMenuOpen.set(false)">{{ item.label | translate }}</a>
        </li>
      }
    </ul>

    <app-language-switcher />
    
    <div class="mobile-theme-selector">
      <p>Thème</p>
      <div class="theme-switcher">
        <button (click)="changeTheme('light')" [class.active]="currentTheme() === 'light'">Clair</button>
        <button (click)="changeTheme('dark')" [class.active]="currentTheme() === 'dark'">Sombre</button>
        <button (click)="changeTheme('system')" [class.active]="currentTheme() === 'system'">Auto</button>
      </div>
    </div>
  </div>
</header>

<!-- Backdrop to close menu when clicking outside -->
@if (isMenuOpen()) { <div class="menu-backdrop" (click)="toggleMenu()"></div> }
