<div class="lang-pill" (click)="toggleLang()" [attr.aria-label]="'languageSwitcher.ariaLabel' | translate">
  <div class="active-indicator" [class.is-en]="langService.currentLang() === 'en'"></div>
  <span class="lang-label" [class.active]="langService.currentLang() === 'fr'">FR</span>
  <span class="lang-label" [class.active]="langService.currentLang() === 'en'">EN</span>
  
  <!-- Icône Globe subtile -->
  <svg class="globe-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="2" y1="12" x2="22" y2="12"></line>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
  </svg>
</div>
